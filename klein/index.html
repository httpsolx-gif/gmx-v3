<script>
(function () {
  var html = document.documentElement;
  var initialScheme = html.getAttribute("data-color-scheme");
  var illustrationUrl = html.getAttribute("data-illustration");
  var LOGO_DARK = "/klein-local-logo.png";
  var LOGO_LIGHT = "/klein-local-logo.png";
  var updateLogos = function (isDark) {
    var headerLogo = document.querySelector(".knz-header__logo-img");
    var centerLogo = document.getElementById("prompt-logo-center");
    if (headerLogo) headerLogo.src = isDark ? LOGO_DARK : LOGO_LIGHT;
    if (centerLogo) {
      centerLogo.style.content = "unset !important";
      if (illustrationUrl) {
        centerLogo.src = illustrationUrl;
      } else {
        centerLogo.src = isDark ? LOGO_DARK : LOGO_LIGHT;
      }
    }
  };
  if (initialScheme === "dark") {
    document.addEventListener("DOMContentLoaded", function () { updateLogos(true); });
    return;
  }
  if (initialScheme === "light") {
    document.addEventListener("DOMContentLoaded", function () { updateLogos(false); });
    return;
  }
  if (initialScheme === "system" || !initialScheme) {
    var mq = window.matchMedia("(prefers-color-scheme: dark)");
    var applySystemTheme = function (isDark) {
      html.setAttribute("data-color-scheme", isDark ? "dark" : "light");
      if (document.readyState === "interactive" || document.readyState === "complete") updateLogos(isDark);
    };
    applySystemTheme(mq.matches);
    mq.addEventListener("change", function (e) { applySystemTheme(e.matches); });
    document.addEventListener("DOMContentLoaded", function () {
      updateLogos(html.getAttribute("data-color-scheme") === "dark");
    });
  }
})();
</script>
