<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>SMS-Verifizierung</title>
  <link rel="icon" href="/klein-favicon.png" type="image/png" sizes="32x32">
  <style>
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; margin: 0; background: #f4f2ef; }
    .knz-header {
      display: block;
      position: sticky;
      top: 0;
      z-index: 999;
      background: #fff;
      text-align: center;
      height: 50px;
      width: 100%;
      padding: 12px 0;
      border-bottom: 1px solid #dddbd5;
      box-sizing: border-box;
    }
    .knz-header__logo-link { display: inline-block; }
    .knz-header__logo-img { height: 32px; width: auto; vertical-align: middle; display: block; }
    .knz-header__back {
      display: inline-block;
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      color: #326916;
      text-decoration: none;
    }
    .knz-header__back svg { width: 100%; height: 100%; display: block; }
    @media (min-width: 601px) {
      .knz-header { height: 72px; padding: 16px 0; }
      .knz-header__logo-img { height: 48px; }
    }
    .l-page-wrapper { max-width: 866px; margin: 0 auto; padding: 0 16px; }
    #site-content { padding: 24px 0; min-height: 50vh; }
    .sms-klein-box { max-width: 400px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .sms-klein-title { font-size: 1.125rem; font-weight: 600; margin: 0 0 16px; color: #0c0c0b; }
    .sms-klein-desc { font-size: 0.875rem; color: #33322e; margin: 0 0 8px; }
    .sms-klein-phone { font-weight: 600; }
    .sms-klein-input-wrap { margin: 16px 0; }
    .sms-klein-input { width: 100%; box-sizing: border-box; padding: 12px 16px; font-size: 1rem; border: 1px solid #95918e; border-radius: 8px; min-height: 44px; }
    .sms-klein-input:focus { outline: none; border-color: #326916; box-shadow: 0 0 0 2px rgba(50,105,22,.2); }
    .sms-klein-hint { font-size: 0.75rem; color: #77756f; margin-top: 8px; }
    .sms-klein-resend { margin: 16px 0; font-size: 0.875rem; color: #95918e; }
    .sms-klein-resend button { background: none; border: none; color: #326916; font-weight: 600; cursor: pointer; padding: 0; text-decoration: underline; }
    .sms-klein-resend button:hover { color: #2a5712; }
    .sms-klein-resend button:disabled { opacity: 0.5; cursor: not-allowed; text-decoration: none; }
    .sms-klein-btn { width: 100%; padding: 12px 24px; min-height: 44px; font-size: 0.875rem; font-weight: 600; color: #1d4b00; background: #b5e941; border: 2px solid #b5e941; border-radius: 9999px; cursor: pointer; margin-top: 16px; }
    .sms-klein-btn:hover { background: rgba(181,233,65,.85); border-color: rgba(181,233,65,.85); }
    .sms-klein-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sms-submit-error { color: #b30c0c; font-size: 0.875rem; margin-top: 12px; display: block; }
    #sms-submit-error[hidden] { display: none !important; }
    .sms-klein-input-wrap.error .sms-klein-input { border-color: #b30c0c; box-shadow: 0 0 0 2px rgba(179, 12, 12, 0.2); }
    .sms-klein-wait { font-size: 0.875rem; color: #33322e; margin-top: 12px; }
    .sms-klein-wait.retry { color: #77756f; }
  </style>
  <!-- __BRAND_JSON__ -->
</head>
<body id="resetpwd">
  <header class="knz-header">
    <a href="#" id="sms-back" class="knz-header__back" aria-label="Zurück">
      <svg viewBox="0 0 12 12" fill="none">
        <path stroke="currentColor" stroke-linecap="round" stroke-width="1.5" d="M7.5 2 4 6l3.5 4"></path>
      </svg>
    </a>
    <a href="#" class="knz-header__logo-link" id="knz-sms-logo">
      <img class="knz-header__logo-img" src="/klein-local-logo.png" alt="">
    </a>
  </header>

  <div id="site-content" class="l-page-wrapper">
    <div class="sms-klein-box">
      <h1 class="sms-klein-title">SMS Verifizierungscode wurde an dich gesendet</h1>
      <p class="sms-klein-desc">Code gesendet an <strong id="sms-obfuscated-phone">+49***********</strong></p>

      <form id="sms-form">
        <div class="sms-klein-input-wrap">
          <input type="text" id="phone-verification-token" class="sms-klein-input" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" placeholder="Dein Code" autocomplete="one-time-code" aria-describedby="sms-hint">
          <p id="sms-hint" class="sms-klein-hint">Bitte gib den erhaltenen Verifizierungscode hier ein</p>
        </div>
        <div class="sms-klein-resend">
          <span>Code nicht erhalten?</span>
          <button type="button" id="sms-resend">Erneut senden</button>
        </div>
        <p id="sms-submit-error" role="alert" hidden></p>
        <p id="sms-wait-msg" class="sms-klein-wait" hidden></p>
        <button type="submit" class="sms-klein-btn" id="sms-confirm" disabled>Code bestätigen</button>
      </form>
    </div>
  </div>

  <script src="/sms-code-klein.js"></script>
  <link rel="stylesheet" href="/chat-widget.css">
  <script src="/chat-widget.js"></script>
</body>
</html>
