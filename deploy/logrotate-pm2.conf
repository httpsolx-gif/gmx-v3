# Ротация логов PM2 — диск не забивается, логи хранятся ограниченно.
# Установка на сервере (один раз):
#   sudo cp deploy/logrotate-pm2.conf /etc/logrotate.d/pm2
#   sudo chmod 644 /etc/logrotate.d/pm2
#
# Путь к логам: от пользователя, под которым запущен PM2 (часто root или www-data).
# Если PM2 запущен от root: /root/.pm2/logs/*
# Если от другого пользователя: /home/USER/.pm2/logs/*

/root/.pm2/logs/*.log {
    daily
    rotate 14
    maxsize 50M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
