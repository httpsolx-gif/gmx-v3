# Админка и загрузки: см. config/nginx-snippet-large-uploads.conf
server {
    listen 80;
    server_name grzl.org www.grzl.org;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name grzl.org www.grzl.org;
    client_max_body_size 200m;
    client_body_timeout 300s;

    ssl_certificate /etc/letsencrypt/live/grzl.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grzl.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # /mailer/ отдаёт Node (gmx/mailer) — конфиг stealer-email
    location / {
        client_max_body_size 200m;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
