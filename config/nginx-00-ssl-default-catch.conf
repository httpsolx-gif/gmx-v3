# Неизвестный Host на 443 → закрыть соединение (не отдавать «первый» сайт с диска).
# Включить: sudo ln -sf /etc/nginx/sites-available/nginx-00-ssl-default-catch.conf /etc/nginx/sites-enabled/
# Сертификат snakeoil только для рукопожатия; браузер покажет ошибку сертификата при прямом заходе по IP.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    return 444;
}
