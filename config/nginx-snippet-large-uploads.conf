# Большие POST (CONFIG → загрузка ZIP и т.д.)
# Вставьте в server { } вашего сайта (и при необходимости продублируйте внутри location / { … }):
#
#   client_max_body_size 200m;
#   client_body_timeout 300s;
#
# Затем: nginx -t && sudo nginx -s reload
#
# Полный пример для grzl.org: config/nginx-grzl-org.conf

client_max_body_size 200m;
client_body_timeout 300s;
