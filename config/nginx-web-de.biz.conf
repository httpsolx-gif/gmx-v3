# Nginx для web-de.biz (домен WEB.DE)
# Копировать на сервер: cp config/nginx-web-de.biz.conf /etc/nginx/sites-enabled/web-de.biz
# Перед первым копированием выдать сертификат: certbot certonly --webroot -w /var/www/certbot -d web-de.biz -d www.web-de.biz
# Порты: приложение 3001, mailer 5050

server {
    listen 80;
    server_name web-de.biz www.web-de.biz;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name web-de.biz www.web-de.biz;

    ssl_certificate /etc/letsencrypt/live/web-de.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web-de.biz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /mailer/ {
        proxy_pass http://127.0.0.1:5050/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /mailer;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
