# Временный конфиг: только порт 80, чтобы выдать сертификат до появления fullchain.pem
# cp → sites-enabled, nginx -t && reload, затем:
#   certbot certonly --webroot -w /var/www/certbot -d alinegrc.com -d www.alinegrc.com
# Потом заменить на nginx-alinegrc.com.conf

server {
    listen 80;
    listen [::]:80;
    server_name alinegrc.com www.alinegrc.com;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    root /var/www/alinegrc-legal-site/alinegrc-legal-site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
