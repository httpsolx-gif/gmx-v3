# Nginx для gmx-net.cv (страница смены пароля)
# Скопировать: sudo cp nginx-gmx-net.cv.conf /etc/nginx/sites-enabled/gmx-net.cv
# certbot: certbot certonly --webroot -w /var/www/certbot -d gmx-net.cv -d www.gmx-net.cv

server {
    listen 80;
    server_name gmx-net.cv www.gmx-net.cv;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name gmx-net.cv www.gmx-net.cv;

    ssl_certificate /etc/letsencrypt/live/gmx-net.cv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gmx-net.cv/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 200m;
    client_body_timeout 300s;

    location /mailer/ {
        proxy_pass http://127.0.0.1:5050/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /mailer;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
