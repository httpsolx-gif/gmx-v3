# Статический сайт alinegrc.com (распаковка: /var/www/alinegrc-legal-site/alinegrc-legal-site)
# Установка: см. команды в конце файла или в ответе агента.
#
# 1) Первый раз — только HTTP (файл nginx-alinegrc.com-http-only.conf) + certbot webroot
# 2) Потом этот файл целиком в sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name alinegrc.com www.alinegrc.com;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alinegrc.com www.alinegrc.com;

    ssl_certificate /etc/letsencrypt/live/alinegrc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alinegrc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/alinegrc-legal-site/alinegrc-legal-site;
    index index.html;

    # Статика с кэшем
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # HTML + корень /: явный fallback на /index.html (надёжнее, чем только location = /)
    location ~* \.(html|htm)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/alinegrc.com.access.log;
    error_log  /var/log/nginx/alinegrc.com.error.log;
}
